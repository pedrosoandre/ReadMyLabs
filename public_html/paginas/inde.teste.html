<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Preview Toolbar Flex</title>
  <style>
    .toolbar {
      width: 100%;
      background: #007bff;
      padding: 0;
      margin: 0;
    }
    .menu {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 32px;
    }
    .menu li {
      margin: 0;
    }
    .menu li a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1em;
      padding: 18px 24px;
      display: block;
      border-radius: 8px 8px 0 0;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .menu li a:hover {
      background: #0056b3;
      color: #e3f2fd;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <ul class="menu">
      <li><a href="#">Labs</a></li>
      <li><a href="#">Exames</a></li>
      <li><a href="#">Parcerias</a></li>
    </ul>
  </header>
</body>
</html>
