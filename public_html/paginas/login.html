<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body {
      background: #f8fbff;
      color: #222;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0,123,255,0.09);
      padding: 32px 28px 24px 28px;
      width: 350px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .login-container label {
      font-size: 15px;
      margin-bottom: 6px;
      color: #222;
      font-weight: 600;
    }
    .login-container input[type="email"] {
      width: 100%;
      padding: 12px;
      border: 1.8px solid #b3d1f7;
      border-radius: 10px;
      background: #f8fbff;
      color: #222;
      font-size: 15px;
      margin-bottom: 8px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(0,123,255,0.07);
    }
    .login-container input[type="email"]:focus {
      border-color: #007bff;
      box-shadow: 0 4px 18px rgba(0,123,255,0.13);
      background: #fff;
    }
    .login-container button, .login-btn {
      width: 100%;
      padding: 14px 0;
      border: none;
      border-radius: 22px;
      font-size: 1.08em;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.2s, box-shadow 0.2s, border-color 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .continue-btn {
      background: #007bff;
      color: #fff;
      border: 2px solid #6ec1ff;
      margin-bottom: 10px;
    }
    .continue-btn:hover {
      background: #0056b3;
      border-color: #2196f3;
      box-shadow: 0 6px 18px rgba(0,0,0,0.16), 0 1.5px 4px rgba(0,0,0,0.10);
      transform: translateY(-2px) scale(1.04);
    }
    .or-separator {
      display: flex;
      align-items: center;
      text-align: center;
      color: #888;
      font-size: 13px;
      margin: 10px 0 6px 0;
    }
    .or-separator::before, .or-separator::after {
      content: '';
      flex: 1;
      border-bottom: 1.5px solid #b3d1f7;
      margin: 0 8px;
    }
    .google-btn {
      background: #fff;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 2px solid #b3d1f7;
      margin-bottom: 6px;
      box-shadow: 0 2px 8px rgba(0,123,255,0.07);
    }
    .google-btn:hover {
      background: #f8fbff;
      border-color: #007bff;
    }
    .google-btn img {
      width: 18px;
      height: 18px;
    }
    .phone-btn {
      background: #fff;
      color: #222;
      border: 2px solid #b3d1f7;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,123,255,0.07);
    }
    .phone-btn:hover {
      background: #f8fbff;
      border-color: #007bff;
      color: #007bff;
    }
    .phone-btn img {
      width: 18px;
      height: 18px;
    }
    .signup-link {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-top: 10px;
    }
    .signup-link a {
      color: #007bff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .signup-link a:hover {
      text-decoration: underline;
      color: #0056b3;
    }
    @media (max-width: 500px) {
      .login-container {
        width: 98vw;
        padding: 16px 2vw 12px 2vw;
        gap: 14px;
      }
      .login-container input[type="email"] {
        font-size: 1em;
        padding: 10px 6px;
        border-radius: 10px;
        margin-bottom: 10px;
      }
      .login-container button, .login-btn {
        font-size: 1em;
        padding: 13px 0;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="logo-top-left">
    <img src="img/logo.png" alt="Logo ReadMyLabs" />
  </div>
  <div class="login-center-wrapper">
    <div class="login-container">
      <form>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email address" required>
        <button type="submit" class="continue-btn">Continue</button>
      </form>
      <div class="or-separator">ou</div>
      <button class="google-btn login-btn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo">
        Continuar com Google
      </button>
      <button class="phone-btn login-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="3" stroke="#222" stroke-width="2" fill="#fff"/><circle cx="12" cy="18" r="1" fill="#222"/></svg>
        Continuar com Telefone Celular
      </button>
      <div class="signup-link">
        Não tem uma conta? <a href="#">Cadastrar</a>
      </div>
    </div>
  </div>
  <style>
    .logo-top-left {
      position: fixed;
      top: 32px;
      left: 32px;
      z-index: 10;
    }
    .logo-top-left img {
      height: 120px;
      width: auto;
      display: block;
    }
    .login-center-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 700px) {
      .logo-top-left {
        top: 12px;
        left: 12px;
      }
      .logo-top-left img {
        height: 64px;
      }
    }
  </style>
</body>
</html>
