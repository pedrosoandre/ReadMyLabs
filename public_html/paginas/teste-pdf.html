<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste PDF.js</title>
</head>
<body>
    <h1>Teste PDF.js</h1>
    <p>Verificando se o PDF.js está carregando...</p>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configurar PDF.js
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        // Teste se carregou
        if (window.pdfjsLib) {
            document.body.innerHTML += '<p style="color: green;">✅ PDF.js carregado com sucesso!</p>';
            console.log('PDF.js carregado:', window.pdfjsLib);
        } else {
            document.body.innerHTML += '<p style="color: red;">❌ PDF.js não carregou!</p>';
        }
    </script>
    
    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        if (window.Tesseract) {
            document.body.innerHTML += '<p style="color: green;">✅ Tesseract.js carregado com sucesso!</p>';
            console.log('Tesseract carregado:', window.Tesseract);
        } else {
            document.body.innerHTML += '<p style="color: red;">❌ Tesseract.js não carregou!</p>';
        }
    </script>
</body>
</html>
